<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Arkowne</title>

<!-- favicon par défaut -->
<link id="favicon" rel="icon" href="https://arkowne.github.io/arkowne.jpg">

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
  }

  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  #menu {
    padding: 20px;
  }

  .link {
    display: block;
    margin: 10px 0;
    color: blue;
    cursor: pointer;
    text-decoration: underline;
  }
</style>

</head>
<body>

<script>
  const params = new URLSearchParams(window.location.search);
  const page = params.get("page");
  const id   = params.get("id");

  const versusUrl = "https://college-compact-worldwide-weddings.trycloudflare.com";

  // Config des pages (titre + icône + url)
  const pages = {
    game: {
      title: "Versus - Playlist Battle",
      icon: "https://arkowne.github.io/favicon.ico",
      url: `${versusUrl}/game`
    },
    quiz: (id) => ({
      title: `Versus - Quiz ${id}`,
      icon: "https://arkowne.github.io/favicon.ico",
      url: `${versusUrl}/load_quiz/${id}`
    })
  };

  function setMeta(title, iconUrl) {
    document.title = title;

    const favicon = document.getElementById("favicon");
    favicon.href = iconUrl;
  }

  function createIframe(url, title, icon) {
    document.body.innerHTML = "";
    setMeta(title, icon);

    const iframe = document.createElement("iframe");
    iframe.src = url;
    document.body.appendChild(iframe);
  }

  // Navigation par URL
  if (page === "game") {
    const p = pages.game;
    createIframe(p.url, p.title, p.icon);

  } else if (page === "load_quiz" && id) {
    const p = pages.quiz(id);
    createIframe(p.url, p.title, p.icon);

  } else {
    const p = pages.quiz(id);
    createIframe(versusUrl, "Versus - Music Battle", "favicon.ico");

    const menu = document.createElement("div");
    menu.id = "menu";

    const title = document.createElement("h2");
    title.textContent = "Choisis une page :";
    menu.appendChild(title);

    const links = [
      {
        text: "Game",
        ...pages.game
      },
      {
        text: "Quiz 1",
        ...pages.quiz(1)
      },
      {
        text: "Quiz 2",
        ...pages.quiz(2)
      }
    ];

    links.forEach(link => {
      const a = document.createElement("div");
      a.className = "link";
      a.textContent = link.text;

      a.onclick = () => {
        createIframe(link.url, link.title, link.icon);
      };

      menu.appendChild(a);
    });

    document.body.appendChild(menu);
  }
</script>

</body>
</html>
