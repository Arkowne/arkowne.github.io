<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Iframe conditionnelle</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="dynamicFrame"></iframe>

  <script>
    const localServer = "https://[2a02:842b:db00:b101:64de:57ee:ea76:2250]:4567";

    // Récupère la query string
    const params = new URLSearchParams(window.location.search);
    let iframePath = window.location.pathname + window.location.search;

    // Si ?page=game, on redirige vers /game sur le serveur local
    if (params.get("page") === "game") {
      iframePath = "/game";
    }

    // URL finale pour l'iframe
    const iframeUrl = localServer + iframePath;

    document.getElementById('dynamicFrame').src = iframeUrl;

    console.log("Iframe URL:", iframeUrl);
  </script>
</body>
</html>
