<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Iframe vers serveur local</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="dynamicFrame"></iframe>

  <script>
    // URL de base du serveur local
    const localServer = "https://[2a02:842b:db00:b101:64de:57ee:ea76:2250]:4567";

    // On récupère le path et la query de la page actuelle
    const currentPath = window.location.pathname; // /versus/lapage.html/gam
    const currentQuery = window.location.search;  // ?qqch

    // On construit l'URL complète pour l'iframe
    const iframeUrl = localServer + currentPath + currentQuery;

    // On met l'iframe à jour
    document.getElementById('dynamicFrame').src = iframeUrl;

    console.log("Iframe URL:", iframeUrl);
  </script>
</body>
</html>
