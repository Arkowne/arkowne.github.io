<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Redirection iframe</title>
<style>
  html, body { margin: 0; height: 100%; }
  iframe { width: 100%; height: 100%; border: none; }
</style>
</head>
<body>

<script>
  // Récupère les paramètres de l'URL
  const params = new URLSearchParams(window.location.search);
  const page = params.get("page");
  const id   = params.get("id");

  let iframeUrl = "";

  if (page === "game") {
    iframeUrl = "https://[2a02:842b:db00:b101:64de:57ee:ea76:2250]:4567/game";
  } else if (page === "load_quiz" && id) {
    iframeUrl = `https://[2a02:842b:db00:b101:64de:57ee:ea76:2250]:4567/load_quiz/${id}`;
  } else {
    iframeUrl = "https://[2a02:842b:db00:b101:64de:57ee:ea76:2250]:4567/";
  }

  // Crée et insère l'iframe
  const iframe = document.createElement("iframe");
  iframe.src = iframeUrl;
  document.body.appendChild(iframe);
</script>

</body>
</html>
