<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Iframe dynamique</title>
<style>
  body, html { margin:0; height:100%; }
  iframe { width:100%; height:100%; border:none; }
</style>
</head>
<body>

<iframe id="dynamicIframe"></iframe>

<script>
(function() {
  const iframe = document.getElementById("dynamicIframe");

  // Récupère le path et la query string
  let path = window.location.pathname; // /versus/mapage.html/load_quiz/a8215ebc
  const search = window.location.search; // ?qqch

  // Supprime "mapage.html" du path
  path = path.replace(/\/[^\/]*\.html/, "");

  // Vérifie si ?page=game → redirige vers /game
  const params = new URLSearchParams(search);
  if (params.get("page") === "game") {
    path = "/game";
  }

  // Construit l'URL finale pour l'iframe
  const iframeUrl = `https://[2a02:842b:db00:b101:64de:57ee:ea76:2250]:4567${path}${search}`;
  iframe.src = iframeUrl;
})();
</script>

</body>
</html>
