<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Versus - Playlist Battle</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden; /* empêche le scroll vertical */
  }

  iframe {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
</style>

</head>
<body>

<script>
  const params = new URLSearchParams(window.location.search);
  const page = params.get("page");
  const id   = params.get("id");

  let iframeUrl = "";

  if (page === "game") {
    iframeUrl = "https://college-compact-worldwide-weddings.trycloudflare.com/game";
  } else if (page === "load_quiz" && id) {
    iframeUrl = `https://college-compact-worldwide-weddings.trycloudflare.com/load_quiz/${id}`;
  } else {
    iframeUrl = "https://arkowne.github.io/redirect.html";
  }

  const iframe = document.createElement("iframe");
  iframe.src = iframeUrl;
  document.body.appendChild(iframe);
</script>

</body>
</html>
